appId: app.code-review
productName: code-review.app

directories:
  output: ../../release

files:
  - out/**/*
  - node_modules/**/*
  - package.json
  - from: ../../packages/backend/drizzle
    to: drizzle
    filter:
      - "**/*"

mac:
  artifactName: code-review.app-${version}-${arch}.${ext}
  target:
    - dmg
    - zip
  icon: build/icons/icon.icns
  entitlements: build/entitlements.mac.plist

linux:
  artifactName: code-review.app-${version}-${arch}.${ext}
  target:
    - AppImage
    - deb
    - rpm
    - pacman
  category: Development
  maintainer: Taras Fomin <Taras.Fomin@gmail.com>
  executableName: code-review.app
  executableArgs:
    - "%U"
  icon: build/icons
  desktop:
    entry:
      Type: Application
      Name: code-review.app
      Comment: Browse GitHub and GitLab pull requests locally
      Icon: code-review.app
      Terminal: "false"
      Categories: Development;Utility;
      MimeType: x-scheme-handler/code-review.app;
      StartupWMClass: code-review.app

deb:
  packageName: code-review.app

rpm:
  packageName: code-review.app

pacman:
  packageName: code-review.app

win:
  artifactName: code-review.app-${version}-${arch}.${ext}
  target:
    - nsis
  icon: build/icons/icon.ico

protocols:
  - name: code-review.app
    schemes:
      - code-review.app

publish:
  - provider: github
    owner: tarik02
    repo: code-review.app

electronUpdaterCompatibility: ">=2.16"
generateUpdatesFilesForAllChannels: false
