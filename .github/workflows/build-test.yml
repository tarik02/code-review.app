name: build-test

on:
  workflow_dispatch:

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-electron:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: bun run build

      - name: Build workflow artifacts
        run: bun run dist -- --publish never
