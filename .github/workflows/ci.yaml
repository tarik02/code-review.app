name: ci

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-x64
            runs_on: macos-15-intel
            platform: mac
            arch: x64
          - name: mac-arm64
            runs_on: macos-15
            platform: mac
            arch: arm64
          - name: linux-x64
            runs_on: ubuntu-24.04
            platform: linux
            arch: x64
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - name: win-x64
            runs_on: windows-2025
            platform: win
            arch: x64
          - name: win-arm64
            runs_on: windows-11-arm
            platform: win
            arch: arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: setup mise
        uses: jdx/mise-action@v4.0.1

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: install linux packaging dependencies
        if: ${{ runner.os == 'Linux' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) }}
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libarchive-tools libopenjp2-tools rpm

      - name: build electron app
        run: pnpm run build

      - name: package release artifacts
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          OUTPUT_DIR="$GITHUB_WORKSPACE/release/${{ matrix.platform }}-${{ matrix.arch }}"

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          pnpm --dir apps/electron exec electron-builder \
            --${{ matrix.platform }} \
            --${{ matrix.arch }} \
            --publish never \
            -c.directories.output="$OUTPUT_DIR" \
            -c.extraMetadata.version="$ROOT_VERSION"

      - name: upload workflow artifacts
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: setup mise
        uses: jdx/mise-action@v4.0.1

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: validate tag version
        run: |
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$ROOT_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match root version $ROOT_VERSION"
            exit 1
          fi

      - name: download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          merge-multiple: false
          path: release-artifacts
          pattern: release-*

      - name: merge updater metadata
        run: pnpm run release:merge-metadata -- --input-dir release-artifacts --output-dir release-assets

      - name: create github release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes

      - name: upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' files < <(find release-assets -maxdepth 1 -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

  checksums:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: check gpg configuration
        id: gpg
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ] && [ -n "$GPG_KEY_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping checksum signing because GPG release secrets are not fully configured."
          fi

      - name: download release assets
        if: steps.gpg.outputs.configured == 'true'
        run: gh release download "$GITHUB_REF_NAME" --dir release-assets

      - name: generate checksums
        if: steps.gpg.outputs.configured == 'true'
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS' ! -name 'SHA256SUMS.asc' -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS

      - name: import gpg key
        if: steps.gpg.outputs.configured == 'true'
        run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: sign checksum manifest
        if: steps.gpg.outputs.configured == 'true'
        run: |
          cd release-assets
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" -u "$GPG_KEY_ID" --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - name: upload checksum files
        if: steps.gpg.outputs.configured == 'true'
        run: gh release upload "$GITHUB_REF_NAME" release-assets/SHA256SUMS release-assets/SHA256SUMS.asc --clobber
