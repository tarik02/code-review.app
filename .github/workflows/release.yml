name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-electron:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-22.04

    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: bun run build

      - name: Publish release
        run: bun run dist -- --publish always

  sign-checksums:
    needs: publish-electron
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check GPG configuration
        id: gpg
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ] && [ -n "$GPG_KEY_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping checksum signing because GPG release secrets are not fully configured."
          fi

      - name: Download release assets
        if: steps.gpg.outputs.configured == 'true'
        run: gh release download ${{ github.ref_name }} --dir release-assets

      - name: Generate checksums
        if: steps.gpg.outputs.configured == 'true'
        run: |
          cd release-assets
          shasum -a 256 * > SHA256SUMS

      - name: Import GPG key
        if: steps.gpg.outputs.configured == 'true'
        run: |
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign checksum manifest
        if: steps.gpg.outputs.configured == 'true'
        run: |
          cd release-assets
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" -u "$GPG_KEY_ID" --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - name: Upload checksum files
        if: steps.gpg.outputs.configured == 'true'
        run: gh release upload ${{ github.ref_name }} release-assets/SHA256SUMS release-assets/SHA256SUMS.asc --clobber
