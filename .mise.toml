[tools]
bun = "1.3.12"
rust = "1.94.1"
gh = "2.89.0"

[tasks.install]
description = "Install project dependencies"
run = [
  "bun install --frozen-lockfile",
  "cargo fetch --manifest-path src-tauri/Cargo.toml --locked",
]

[tasks.dev]
description = "Run the Tauri development app"
run = "bun run tauri dev"
